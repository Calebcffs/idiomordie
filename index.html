<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Idiom or Idiot?</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(135deg, #fff7ed, #fffbeb, #eff6ff);
      color: #0f172a;
      min-height: 100vh;
      padding: 24px;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 1.3fr 0.7fr;
      gap: 24px;
    }

    @media (max-width: 850px) {
      .container {
        grid-template-columns: 1fr;
      }
    }

    .card {
      background: rgba(255, 255, 255, 0.92);
      border-radius: 28px;
      padding: 28px;
      box-shadow: 0 18px 45px rgba(15, 23, 42, 0.12);
      backdrop-filter: blur(8px);
    }

    .badges {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 12px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      padding: 7px 12px;
      font-size: 13px;
      font-weight: 700;
      background: #e2e8f0;
      color: #334155;
      white-space: nowrap;
    }

    .badge.orange {
      background: #f97316;
      color: white;
    }

    h1 {
      font-size: clamp(38px, 6vw, 64px);
      line-height: 0.95;
      margin: 0;
      letter-spacing: -0.05em;
    }

    h2 {
      font-size: clamp(30px, 5vw, 54px);
      line-height: 1.05;
      margin: 0;
      letter-spacing: -0.04em;
    }

    h3 {
      font-size: 26px;
      margin: 0 0 6px;
    }

    p {
      line-height: 1.5;
    }

    .subtitle {
      color: #475569;
      max-width: 700px;
      font-size: 17px;
    }

    .top-row {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: flex-start;
      flex-wrap: wrap;
      margin-bottom: 28px;
    }

    button {
      border: 0;
      border-radius: 18px;
      padding: 14px 18px;
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
      transition: transform 0.12s ease, opacity 0.12s ease, background 0.12s ease;
    }

    button:hover {
      transform: translateY(-1px);
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.6;
      transform: none;
    }

    .btn-outline {
      border: 1px solid #cbd5e1;
      background: white;
      color: #0f172a;
    }

    .btn-dark {
      background: #020617;
      color: white;
    }

    .btn-green {
      background: #10b981;
      color: white;
    }

    .btn-red {
      background: #ef4444;
      color: white;
    }

    .btn-orange {
      background: #f97316;
      color: white;
      width: 100%;
    }

    .progress {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 8px;
      margin-bottom: 22px;
    }

    .progress div {
      height: 9px;
      border-radius: 999px;
      background: #e2e8f0;
    }

    .progress .active {
      background: #fb923c;
    }

    .progress .correct {
      background: #10b981;
    }

    .progress .wrong {
      background: #ef4444;
    }

    .question-box {
      background: #020617;
      color: white;
      border-radius: 28px;
      padding: 30px;
      min-height: 310px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .question-meta {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      color: #fdba74;
      text-transform: uppercase;
      letter-spacing: 0.16em;
      font-size: 13px;
      font-weight: 800;
      margin-bottom: 20px;
    }

    .score-pill {
      background: rgba(255, 255, 255, 0.1);
      color: #e2e8f0;
      padding: 7px 11px;
      border-radius: 999px;
      text-transform: none;
      letter-spacing: 0;
    }

    .meaning {
      margin-top: 24px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      padding: 18px;
    }

    .meaning-label {
      font-size: 14px;
      color: #cbd5e1;
      font-weight: 800;
      margin-bottom: 4px;
    }

    .answer-buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      margin-top: 20px;
    }

    @media (max-width: 600px) {
      .answer-buttons {
        grid-template-columns: 1fr;
      }
    }

    .answer-buttons button {
      min-height: 66px;
      font-size: 19px;
    }

    .feedback {
      margin-top: 16px;
      background: white;
      border-radius: 18px;
      padding: 16px;
      text-align: center;
      font-weight: 800;
      border: 1px solid #e2e8f0;
    }

    .results {
      background: white;
      border-radius: 26px;
      padding: 28px;
      display: none;
    }

    .results-row {
      display: flex;
      justify-content: space-between;
      gap: 18px;
      align-items: center;
      flex-wrap: wrap;
    }

    .form-disabled {
      opacity: 0.4;
      pointer-events: none;
    }

    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 6px;
    }

    input,
    textarea {
      width: 100%;
      border: 1px solid #cbd5e1;
      border-radius: 16px;
      padding: 13px 14px;
      font: inherit;
      margin-bottom: 14px;
      background: white;
    }

    textarea {
      min-height: 95px;
      resize: vertical;
    }

    .toggle-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 14px;
    }

    .toggle-row button {
      background: white;
      border: 1px solid #cbd5e1;
      color: #0f172a;
    }
